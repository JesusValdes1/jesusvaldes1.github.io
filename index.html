<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Jesús Valdés | Backend Developer</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="plugins/bootstrap-5.1.3/css/bootstrap.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="plugins/fontawesome-free/css/all.min.css">
    <!-- CSS Personal -->
    <link rel="stylesheet" href="css/style.css?v=1.02">

</head>


<body>

    <style>
        .section-container {
            position: relative;
            width: 100%;
            overflow: hidden;
        }

        .section-padding {
            padding-top: var(--section-padding);
            padding-bottom: var(--section-padding);
        }

        .container-custom {
            max-width: var(--container-width);
            margin: 0 auto;
            padding-left: 20px;
            padding-right: 20px;
        }

        .text-gradient {
            background: linear-gradient(
                90deg,
                var(--color-primary),
                var(--color-secondary)
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(15px);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
        }

        .btn-custom-primary {
            background: linear-gradient(
                90deg,
                var(--color-primary),
                var(--color-secondary)
            );
            color:white;
            border:none;
            border-radius: var(--radius-sm);
            padding:12px 28px;
            transition:var(--transition);
        }

        .btn-custom-primary:hover {
            transform:translateY(-3px);
            box-shadow:var(--shadow-md);
        }
    </style>

    <div id="navbar"></div>

    <main>
        <div id="home" class="section-container"></div>

        <div id="about" class="section-container"></div>

        <div id="experience" class="section-container"></div>

        <div id="skills" class="section-container"></div>

        <div id="projects" class="section-container"></div>

        <div id="contact" class="section-container"></div>
    </main>

    <div id="footer"></div>

    <!-- Bootstrap -->
    <script src="plugins/bootstrap-5.1.3/js/bootstrap.bundle.min.js"></script>
    <!-- Anime.js -->
    <script src="plugins/animejs/anime.min.js"></script>
    <!-- Configuración -->
    <script src="js/config.js?v=1.00"></script>
    <!-- Loader -->
    <script src="js/loader.js?v=1.00"></script>
    <!-- Módulos -->
    <script src="js/navbar.js?v=1.00"></script>
    <script src="js/home.js?v=1.00"></script>
    <script src="js/about.js?v=1.00"></script>
    <script src="js/experience.js?v=1.00"></script>
    <script src="js/skills.js?v=1.00"></script>
    <script src="js/projects.js?v=1.00"></script>
    <script src="js/contact.js?v=1.00"></script>
    <script src="js/footer.js?v=1.00"></script>
    <script src="js/animations.js?v=1.00"></script>
    <!-- Principal -->
    <script src="js/main.js?v=1.02"></script>

</body>

</html>
